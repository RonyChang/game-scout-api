name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Django check
        run: python manage.py check --settings=game_scout.settings.test

      - name: Check missing migrations
        run: python manage.py makemigrations --check --dry-run --settings=game_scout.settings.test

      - name: Lint
        run: |
          ruff check .
          black --check .

      - name: Type check
        run: mypy .

      - name: Tests
        run: pytest
